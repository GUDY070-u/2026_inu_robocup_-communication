robocup_planner:
  ros__parameters:

    # Path to the AMR waypoint YAML.
    # ament_python 패키지 설치 후 share 디렉토리에 복사된 경로를 자동 참조합니다.
    # 실제 로봇 환경에서는 아래 경로를 갱신된 맵 파일로 교체하세요.
    waypoint_yaml: ""  # 비어 있으면 DistanceCalculator를 비활성화 (거리 inf)
    # 아래 경로는 colcon install 후 자동 설정됩니다 (launch 파일에서 덮어씁니다):
    # ~/.../install/robocup_planner/share/robocup_planner/config/robocup_waypoint.yaml

    # --- AMR Motion Parameters ---
    driving_velocity: 0.5        # m/s
    driving_acceleration: 0.3    # m/s^2

    parking_velocity: 0.15       # m/s
    parking_acceleration: 0.1    # m/s^2

    parking_duration: 1.5        # seconds
    exiting_duration: 1.0        # seconds

    # --- Operation Durations ---
    loading_duration: 3.0        # seconds per block
    unloading_duration: 2.0      # seconds per block
    workbench_assemble_duration: 15.0   # seconds
    workbench_disassemble_duration: 10.0  # seconds

    # --- Timing Compensation ---
    time_offset: 0.0
    error_margin: 2.0

    # --- ROS Topic / Action / Service Names ---
    # (communication 레포 mock 노드 기준)
    task_topic: "/sml/task"
    nav_action: "navigate_to_station"
    wb_action:  "wb_task"
    arm_service: "/amr_robot_command"
    wb_ready_topic: "/workbench/product_ready"
